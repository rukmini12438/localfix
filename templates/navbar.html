{% load static %}
<nav class="navbar-localfix">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="{% url 'home' %}" class="d-flex align-items-center gap-2 text-decoration-none">
      <span class="brand-icon"><i class="fa-solid fa-shield-halved"></i></span>
      <span class="brand-text text-dark">Local<span>Fix</span></span>
    </a>

    <div class="d-none d-md-flex align-items-center gap-4">
      <a href="{% url 'listing_list' %}" class="nav-link">Explore</a>
      <a href="#how-it-works" class="nav-link">How it works</a>
      {% if user.is_authenticated and user.profile.is_provider %}
        <a href="{% url 'listing_create' %}" class="nav-link">Post a job</a>
      {% else %}
        <a href="{% url 'listing_list' %}" class="nav-link">Post a job</a>
      {% endif %}
    </div>

    <div class="d-flex align-items-center gap-3">
      {% if user.is_authenticated %}
        <a href="#" class="text-dark position-relative text-decoration-none">
          <i class="fa-regular fa-bell fs-5"></i>
          <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger rounded-circle"></span>
        </a>
        <a href="{% url 'dashboard' %}" class="text-decoration-none">
          <span class="avatar-circle">{{ user.username|slice:":2"|upper }}</span>
        </a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-sm">Log in</a>
        <a href="{% url 'signup' %}" class="btn btn-sm text-white" style="background: var(--indigo-600);">Sign up</a>
      {% endif %}
    </div>
  </div>
</nav>
