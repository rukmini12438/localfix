{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <h2 class="fw-bold mb-4">Browse Services</h2>
  <div class="row g-4">
    {% for l in listings %}
    <div class="col-md-4">
      <div class="provider-card"><div class="top-bar" style="background:#4F46E5;"></div>
        <div class="body">
          <h5 class="fw-bold">{{ l.title }}</h5>
          <p class="text-muted small">{{ l.category.name }} - {{ l.location }}</p>
          <p class="fw-bold">{{ l.price_range }}</p>
          <a href="{{ l.get_absolute_url }}" class="btn-book d-block text-center" style="background:#4F46E5;">View Details</a>
        </div>
      </div>
    </div>
    {% empty %}<p>No listings found.</p>{% endfor %}
  </div>
</div>
{% endblock %}
