{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container py-5" style="max-width:420px;">
  <h2 class="fw-bold mb-4">Log in</h2>
  <form method="post">{% csrf_token %}{{ form|crispy }}
    <button class="btn w-100 text-white mt-3" style="background:var(--indigo-600);">Log in</button>
  </form>
</div>
{% endblock %}
